<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Golden glow gradient -->
    <radialGradient id="glow" cx="50%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#F5D76E" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#E8B830" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C89A1A" stop-opacity="0"/>
    </radialGradient>
    <!-- Earth gradient -->
    <radialGradient id="earth" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="60%" stop-color="#2E6CB5"/>
      <stop offset="100%" stop-color="#1A4A7A"/>
    </radialGradient>
    <!-- Bible cover gradient -->
    <linearGradient id="bibleCover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#4A2820"/>
    </linearGradient>
    <!-- Bible page -->
    <linearGradient id="biblePage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#F5EDD6"/>
    </linearGradient>
    <!-- Light rays filter -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="200" cy="200" r="190" fill="#0D1B2A" opacity="0.03"/>

  <!-- Light rays from Bible to Earth -->
  <g opacity="0.15" filter="url(#softGlow)">
    <polygon points="200,130 160,260 240,260" fill="#F5D76E"/>
    <polygon points="200,140 130,270 270,270" fill="#F5D76E" opacity="0.5"/>
  </g>

  <!-- Central light rays -->
  <g opacity="0.25">
    <line x1="200" y1="140" x2="200" y2="260" stroke="#F5D76E" stroke-width="2"/>
    <line x1="200" y1="140" x2="170" y2="260" stroke="#E8B830" stroke-width="1.5"/>
    <line x1="200" y1="140" x2="230" y2="260" stroke="#E8B830" stroke-width="1.5"/>
    <line x1="200" y1="140" x2="140" y2="250" stroke="#D4A520" stroke-width="1"/>
    <line x1="200" y1="140" x2="260" y2="250" stroke="#D4A520" stroke-width="1"/>
  </g>

  <!-- Main glow behind Bible -->
  <ellipse cx="200" cy="140" rx="80" ry="60" fill="url(#glow)" filter="url(#softGlow)"/>

  <!-- Open Bible - left page -->
  <g transform="translate(200,145)">
    <!-- Left page -->
    <path d="M-35,-30 L-35,35 C-35,38 -30,40 -25,40 L-5,40 L-5,-30 Z" fill="url(#biblePage)" stroke="#C9B896" stroke-width="1"/>
    <!-- Right page -->
    <path d="M35,-30 L35,35 C35,38 30,40 25,40 L5,40 L5,-30 Z" fill="url(#biblePage)" stroke="#C9B896" stroke-width="1"/>
    <!-- Spine -->
    <line x1="0" y1="-30" x2="0" y2="40" stroke="#8B7355" stroke-width="2"/>
    <!-- Text lines on left page -->
    <g opacity="0.4">
      <rect x="-28" y="-20" width="20" height="2" rx="1" fill="#4A3728"/>
      <rect x="-28" y="-14" width="20" height="2" rx="1" fill="#4A3728"/>
      <rect x="-28" y="-8" width="18" height="2" rx="1" fill="#4A3728"/>
      <rect x="-28" y="-2" width="22" height="2" rx="1" fill="#4A3728"/>
      <rect x="-28" y="4" width="16" height="2" rx="1" fill="#4A3728"/>
      <rect x="-28" y="10" width="20" height="2" rx="1" fill="#4A3728"/>
      <rect x="-28" y="16" width="18" height="2" rx="1" fill="#4A3728"/>
      <rect x="-28" y="22" width="21" height="2" rx="1" fill="#4A3728"/>
    </g>
    <!-- Text lines on right page -->
    <g opacity="0.4">
      <rect x="12" y="-20" width="20" height="2" rx="1" fill="#4A3728"/>
      <rect x="12" y="-14" width="20" height="2" rx="1" fill="#4A3728"/>
      <rect x="12" y="-8" width="16" height="2" rx="1" fill="#4A3728"/>
      <rect x="12" y="-2" width="22" height="2" rx="1" fill="#4A3728"/>
      <rect x="12" y="4" width="18" height="2" rx="1" fill="#4A3728"/>
      <rect x="12" y="10" width="20" height="2" rx="1" fill="#4A3728"/>
      <rect x="12" y="16" width="16" height="2" rx="1" fill="#4A3728"/>
    </g>
  </g>

  <!-- Bible covers - outer edges -->
  <path d="M-40,-32 L-40,35 C-40,40 -33,44 -25,44 L-5,44 L-5,-32 Z" fill="url(#bibleCover)" stroke="#1A0E08" stroke-width="1.5" opacity="0.7"/>
  <path d="M40,-32 L40,35 C40,40 33,44 25,44 L5,44 L5,-32 Z" fill="url(#bibleCover)" stroke="#1A0E08" stroke-width="1.5" opacity="0.7"/>

  <!-- Cross on top of Bible -->
  <g transform="translate(200,115)">
    <rect x="-2" y="-15" width="4" height="30" rx="2" fill="#D4A520"/>
    <rect x="-12" y="-10" width="24" height="4" rx="2" fill="#D4A520"/>
  </g>

  <!-- Earth below -->
  <circle cx="200" cy="270" r="38" fill="url(#earth)" stroke="#3A80CC" stroke-width="1.5"/>
  <!-- Continents (simplified) -->
  <g fill="#5EAC5E" opacity="0.7">
    <!-- North America -->
    <path d="M185,255 Q190,250 195,253 Q198,256 194,260 Q190,258 185,255Z"/>
    <!-- South America -->
    <path d="M192,265 Q196,263 198,268 Q196,273 190,275 Q188,270 192,265Z"/>
    <!-- Europe/Africa -->
    <path d="M208,252 Q212,250 214,254 Q214,260 210,265 Q206,262 208,258Z"/>
    <!-- Africa lower -->
    <path d="M210,265 Q214,264 216,270 Q214,278 210,280 Q208,274 210,265Z"/>
    <!-- Asia -->
    <path d="M215,255 Q220,252 222,256 Q220,262 215,260Z"/>
  </g>

  <!-- Earth highlight -->
  <ellipse cx="190" cy="258" rx="12" ry="8" fill="white" opacity="0.08"/>

  <!-- Golden ring around Earth (orbit-like) -->
  <circle cx="200" cy="270" r="44" fill="none" stroke="#D4A520" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
</svg>
