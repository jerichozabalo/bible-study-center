---
---
<article class="container post-page">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.author %}
    <p class="post-author">By {{ page.author }}</p>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <nav class="post-nav">
    {% if page.previous.url %}
    <a href="{{ site.baseurl }}{{ page.previous.url }}" class="post-nav-prev">&larr; Previous</a>
    {% endif %}
    {% if page.next.url %}
    <a href="{{ site.baseurl }}{{ page.next.url }}" class="post-nav-next">Next &rarr;</a>
    {% endif %}
  </nav>
</article>
